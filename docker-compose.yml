services:
  app:
    build: .
    container_name: hellodbapp
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

  postgres:
    image: postgres:17
    container_name: hellodb
    environment:
      POSTGRES_USER: hellodb
      POSTGRES_PASSWORD: myPostgres
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ryo.yamachan36@gmail.com
      PGADMIN_DEFAULT_PASSWORD: nn123mm
    ports:
      - "8081:80"
    volumes:
      - pgadmin:/var/lib/pgadmin

volumes:
  postgres:
  pgadmin: